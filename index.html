<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Votre Nom ou Nom d'Entreprise] | [Votre Activité]</title>
    <meta name="description" content="Découvrez les services de [Votre Nom]. Spécialiste en [Votre Domaine] à [Votre Ville].">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        .video-container {
            margin: 30px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: block;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            background-color: var(--accent-color);
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            background-color: #2563eb;
        }
        .btn-secondary {
            background-color: transparent;
            border: 2px solid #475569;
            color: #cbd5e1;
        }
        .btn-secondary:hover {
            background-color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>[Votre Nom ou Pseudo]</h1>
        <p>[Une phrase simple qui explique ce que vous faites. Exemple : "Consultant en stratégie digitale & créateur de contenus visuels."]</p>
        
        <!-- Intégration de votre vidéo Higgsfield -->
        <div class="video-container">
            <video autoplay loop muted playsinline>
                <source src="votre-video.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la lecture de vidéos.
            </video>
        </div>

        <div class="links">
            <a href="mailto:votre-email@exemple.com" class="btn">Me contacter par Email</a>
            <a href="[Lien LinkedIn, Instagram ou autre]" class="btn btn-secondary" target="_blank">Suivez-moi sur les réseaux</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davy Jourget, photographe</title>
    <meta name="description" content="Découvrez les services de Davy Jourget. Spécialiste en photographie à Rochefort, Charente-Maritime (17).">
    <style>
        :root {
            /* Palette de gris très foncés et tons simples */
            --bg-color: #121214;       /* Gris très foncé / Anthracite */
            --container-bg: #1e1e22;   /* Gris foncé pour détacher légèrement le contenu */
            --text-main: #ffffff;      /* Blanc pur pour le titre */
            --text-muted: #e2e8f0;     /* Gris très clair pour le texte secondaire */
            --text-dark: #94a3b8;      /* Gris intermédiaire pour les détails */
            --border-color: #334155;   /* Gris pour les bordures */
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-muted);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background-color: var(--container-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 1.8rem; /* Taille réduite */
            margin-top: 0;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 700;
        }

        p {
            font-size: 0.95rem; /* Taille réduite */
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Conteneur pour la photo au format horizontal 3:2 */
        .image-container {
            width: 100%;
            aspect-ratio: 3 / 2; /* Force le rapport de forme 3:2 */
            margin-top: 30px;
            margin-bottom: 15px; /* Espacement réduit pour accueillir la bande suivante */
            border-radius: 8px;
            overflow: hidden;
            background-color: #2d2d34; /* Fond d'attente gris */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        /* Nouveau conteneur pour la photo au format panoramique 13:1 */
        .image-container-wide {
            width: 100%;
            aspect-ratio: 13 / 1; /* Force le rapport de forme 13:1 */
            margin-top: 15px;
            margin-bottom: 30px;
            border-radius: 4px; /* Bordure légèrement plus fine pour le format panoramique */
            overflow: hidden;
            background-color: #2d2d34;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .image-container img, .image-container-wide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Remplit l'espace sans déformer l'image */
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        /* Boutons uniquement dans les tons gris et blanc */
        .btn {
            background-color: var(--text-main); /* Bouton principal blanc */
            color: var(--bg-color);             /* Texte foncé */
            padding: 14px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem; /* Taille réduite */
            transition: background-color 0.2s, transform 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--text-muted); /* Devient gris très clair au survol */
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-main); /* Texte blanc */
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05); /* Léger voile blanc au survol */
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Davy Jourget, photographe.</h1>
        <p>Photographe indépendant avec plus de 25 ans d'expérience,<br>
            je suis disponible pour vous accompagner dans vos projets photographiques.<br>
            N'hésitez pas à me contacter pour tout renseignement.</p>
        
        <!-- Première zone d'image (Format 3:2) -->
        <div class="image-container">
            <img src="ma-photo.jpg" alt="Photographie de présentation de Davy Jourget, photographe à Rochefort, Charente-Maritime (17)">
        </div>

        <!-- Nouvelle zone d'image (Format panoramique 13:1) -->
        <div class="image-container-wide">
            <img src="ma-photo-large.jpg" alt="Bandeau photographique de Davy Jourget">
        </div>

        <div class="links">
            <a href="mailto:davyjourget@gmail.com" class="btn">Me contacter par Email</a>            
        </div>
    </div>

</body>
</html>
